name: TrackNet Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 0'

concurrency:
  group: tracknet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tracknet-smoke:
    name: TrackNet export and load smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: shuttlescope

    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            shuttlescope/backend/requirements.txt

      - name: Install TrackNet dependencies
        run: |
          python -m pip install -r backend/requirements.txt
          python -m pip install tensorflow tf2onnx

      - name: Download weights and export ONNX
        run: python -m backend.tracknet.setup export

      - name: Smoke-load ONNX and auto backend
        run: |
          python - <<'PY'
          from backend.tracknet.inference import get_inference

          onnx_inf = get_inference("onnx_cpu")
          assert onnx_inf.is_available(), "onnx_cpu backend is not available"
          assert onnx_inf.load(), "onnx_cpu backend failed to load"

          auto_inf = get_inference("auto")
          assert auto_inf.is_available(), "auto backend is not available"
          assert auto_inf.load(), "auto backend failed to load"

          print("TrackNet smoke passed:", onnx_inf.backend_name(), auto_inf.backend_name())
          PY

      - name: Upload TrackNet export artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tracknet-export-artifacts
          path: |
            shuttlescope/backend/tracknet/weights/*.onnx
            shuttlescope/backend/tracknet/weights/*.index
            shuttlescope/backend/tracknet/weights/*.data-00000-of-00001
          if-no-files-found: warn
