name: TrackNet Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 0'

concurrency:
  group: tracknet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tracknet-smoke:
    name: TrackNet export and load smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: shuttlescope

    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: |
            shuttlescope/backend/requirements.txt

      - name: Install TrackNet dependencies
        run: |
          python -m pip install -r backend/requirements.txt
          # TF 2.15 (Keras 2) is the last release that loads the V1/V2
          # checkpoint format produced by Chang-Chia-Chi/TrackNet via
          # model.load_weights("weights/TrackNet"). Keras 3 (TF >= 2.16)
          # only accepts .keras / .weights.h5 / .h5 files.
          python -m pip install "tensorflow==2.15.*" "tf2onnx>=1.16,<1.17"
          # onnxruntime is required by the Smoke-load step to load the
          # exported tracknet.onnx. Not in backend/requirements.txt
          # because production may use OpenVINO instead.
          python -m pip install onnxruntime

      - name: Download TensorFlow weights
        run: python -m backend.tracknet.setup download

      - name: Export ONNX from TensorFlow checkpoint
        run: python -m backend.tracknet.setup export

      - name: Smoke-load ONNX and auto backend
        run: |
          python - <<'PY'
          from backend.tracknet.inference import get_inference

          onnx_inf = get_inference("onnx_cpu")
          assert onnx_inf.is_available(), "onnx_cpu backend is not available"
          assert onnx_inf.load(), "onnx_cpu backend failed to load"

          auto_inf = get_inference("auto")
          assert auto_inf.is_available(), "auto backend is not available"
          assert auto_inf.load(), "auto backend failed to load"

          print("TrackNet smoke passed:", onnx_inf.backend_name(), auto_inf.backend_name())
          PY

      - name: Upload TrackNet export artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tracknet-export-artifacts
          path: |
            shuttlescope/backend/tracknet/weights/*.onnx
            shuttlescope/backend/tracknet/weights/*.index
            shuttlescope/backend/tracknet/weights/*.data-00000-of-00001
          if-no-files-found: warn
