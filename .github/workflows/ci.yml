name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 2026-05-07: backend test スイートが拡大して 30 分上限に引っかかり cancel された
    # (run 25501537934)。45 分に引き上げる。長期的には pytest-xdist で parallelize
    # するのが本筋だが、まずはタイムアウト緩和で CI を回す。
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        working-directory: shuttlescope

    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: shuttlescope/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: shuttlescope/backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Lint (if config exists)
        if: ${{ hashFiles('shuttlescope/eslint.config.*', 'shuttlescope/.eslintrc*') != '' }}
        run: npm run lint

      - name: Build desktop app
        run: npm run build

      - name: Frontend tests
        run: npx vitest run --config vitest.config.ts

      - name: Backend tests
        # 2026-05-08: pytest-xdist で並列化。45 分上限を 25 分台に短縮想定。
        # `-n auto` は CI runner の論理 CPU 数 (= 4 通常) で並列化。
        # 不安定 test (DB fixture / file race) があれば `--dist loadgroup` か
        # `@pytest.mark.serial` で同期化する。
        run: python -m pytest -n auto --dist loadfile -v

      - name: Python bytecode smoke
        run: python -m compileall backend

      - name: Frontend security conventions check
        # Phase B/C: localfile:/// 直接構築、video_local_path 漏洩、idempotency なし
        # 等の規約違反を grep で検出する
        run: python scripts/check_security_conventions.py
