name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        working-directory: shuttlescope

    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: shuttlescope/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: shuttlescope/backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Lint (if config exists)
        if: ${{ hashFiles('shuttlescope/eslint.config.*', 'shuttlescope/.eslintrc*') != '' }}
        run: npm run lint

      - name: Build desktop app
        run: npm run build

      - name: Frontend tests
        run: npx vitest run --config vitest.config.ts

      - name: Backend tests
        run: python -m pytest -v

      - name: Python bytecode smoke
        run: python -m compileall backend
