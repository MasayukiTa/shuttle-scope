name: Security Attacks (no-auth)

# admin/analyst 等の本番アカウント情報は使わず、無認証で動く攻撃のみを実行する。
# 詳細: shuttlescope/scripts/security_ci/README.md

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # 毎日 06:00 UTC (JST 15:00) に本番を攻撃
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      target_host:
        description: '攻撃対象 host (default: app.shuttle-scope.com)'
        required: false
        default: 'app.shuttle-scope.com'

concurrency:
  group: security-attacks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  no-auth-attacks:
    name: No-auth attack suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Run attack suite
        env:
          SS_ATTACK_HOST: ${{ github.event.inputs.target_host || 'app.shuttle-scope.com' }}
          SS_ATTACK_PORT: '443'
          PYTHONUNBUFFERED: '1'
        run: |
          cd shuttlescope/scripts/security_ci
          python run_all.py

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-attack-logs-${{ github.run_id }}
          path: shuttlescope/scripts/security_ci/*.json
          if-no-files-found: ignore
          retention-days: 30
