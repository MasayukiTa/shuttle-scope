name: Desktop Package Smoke

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows-package-smoke:
    name: Windows package smoke
    runs-on: windows-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: shuttlescope

    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: shuttlescope/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package Windows app (unpacked)
        run: npx electron-builder --win --dir

      - name: Upload unpacked artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-package-smoke
          path: shuttlescope/dist/**
          if-no-files-found: error
